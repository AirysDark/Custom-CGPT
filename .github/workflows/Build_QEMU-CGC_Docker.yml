name: Build QEMU-CGC Docker Image and Binary

on:
  workflow_dispatch:

jobs:
  build-docker:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Build the Docker image
      - name: Build Docker image
        run: |
          export D_IMG=custom-cgpt-qemu
          DOCKER_DIR=cgc_env/docker

          if [ ! -f "$DOCKER_DIR/qemu.Dockerfile" ]; then
            echo "Dockerfile not found in $DOCKER_DIR"
            exit 1
          fi

          docker build -f "$DOCKER_DIR/qemu.Dockerfile" -t $D_IMG "$DOCKER_DIR"

      # 3️⃣ Verify Docker image
      - name: Verify Docker image
        run: docker images | grep custom-cgpt-qemu

      # 4️⃣ Build QEMU-CGC inside Docker
      - name: Build QEMU-CGC Binary inside Docker
        run: |
          # Use repo-relative paths on the runner
          SRC_DIR="$(pwd)/cgc_env/qemu-cgc"     # This is already in the repo
          BIN_DIR="$(pwd)/qemu-cgc-bin"         # Output inside the runner
          mkdir -p "$BIN_DIR"

          echo "Running QEMU-CGC build inside Docker..."

          docker run --rm \
            --ulimit nofile=65535:65535 \
            -v "$SRC_DIR":/qemu-cgc \
            -v "$BIN_DIR":/qemu-cgc-bin \
            -w /qemu-cgc \
            custom-cgpt-qemu \
            bash -c "
              set -e
              
              sed -i 's/--target-list=.*$/--target-list=x86_64-linux-user/' cgc_configure_opt
              ./cgc_configure_opt
              make -j1 qemu-common
              make -j1 qemu-user
              make -j1 ui
              make -j1 tests
              make -j1 target-x86_64
              cp qemu-user/qemu64/qemu-x86_64 /qemu-cgc-bin/
            "

      # 5️⃣ Verify output binary
      - name: Verify QEMU-CGC Binary
        run: ls -l qemu-cgc-bin/
