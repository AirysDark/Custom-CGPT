name: Manual Docker QEMU-CGC Build

# Trigger only manually from GitHub UI
on:
  workflow_dispatch:

jobs:
  docker-qemu-build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Build Docker image
      run: |
        docker build -t custom-cgpt-qemu \
          -f ./cgc_env/docker/qemu.Dockerfile \
          ./cgc_env/docker

    - name: Make QEMU build script executable
      run: |
        chmod +x ./qemu-cgc/cgc_configure_opt
        dos2unix ./qemu-cgc/cgc_configure_opt || echo "No dos2unix installed"

    - name: Run QEMU-CGC build inside Docker
      run: |
        docker run --rm \
          -v ${{ github.workspace }}/qemu-cgc:/workspace \
          -w /workspace \
          custom-cgpt-qemu \
          /bin/bash -c "./cgc_configure_opt && make -j$(nproc) qemu-user/qemu64"
