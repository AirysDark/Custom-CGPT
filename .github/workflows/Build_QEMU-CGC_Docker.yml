name: Docker + QEMU-CGC Build

on:
  workflow_dispatch:
    inputs:
      target: 
        description: "Target to build (optional)"
        default: "x86_64-linux-user"

jobs:
  build-docker-qemu:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      run: |
        echo "Building custom-cgpt-qemu Docker image..."
        docker build \
          -t custom-cgpt-qemu \
          -f ./cgc_env/docker/qemu.Dockerfile \
          ./cgc_env/docker

    - name: Run QEMU-CGC build inside container
      run: |
        echo "Running QEMU-CGC build inside Docker..."
        docker run --rm \
          -v ${{ github.workspace }}/qemu-cgc:/workspace \
          -w /workspace \
          custom-cgpt-qemu \
          /bin/bash -c "./cgc_configure_opt && make -j$(nproc) qemu-user/qemu64"

    - name: Upload QEMU-CGC build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: qemu-cgc-build
        path: qemu-cgc/x86_64-linux-user/qemu64
