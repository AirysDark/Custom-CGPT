name: Build libcgc x86_64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libcgc-64bit:
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            make \
            git \
            g++-12 \
            libstdc++-12-dev \
            libc++-dev \
            libc++abi-dev \
            python3-pip \
            tree \
            ninja-build \
            cmake
          pip3 install \
            xlsxwriter \
            pycryptodome \
            defusedxml \
            pyyaml \
            matplotlib

      # 3️⃣ Copy libcgc folder (sources + headers)
      - name: Copy libcgc folder
        run: |
          mkdir -p libcgc
          cp -r cgc_env/libcgc/* libcgc/

      # 4️⃣ Build libcgc (x86_64)
      - name: Build libcgc
        run: |
          cd libcgc
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 /usr/lib/x86_64-linux-gnu/libstdc++.so
          rm -rf build64/
          mkdir build64 && cd build64
          BUILD64=1 cmake .. -GNinja
          ninja cgc pov libpov || true  # continue even if some targets fail

      # 5️⃣ Prepare artifact folder
      - name: Prepare artifact folder
        run: |
          mkdir -p artifact/libcgc-x86_64
          # Copy source folders and files
          cp -r libcgc/include artifact/libcgc-x86_64/include || true
          cp -r libcgc/libpov artifact/libcgc-x86_64/libpov
          cp -r libcgc/pov artifact/libcgc-x86_64/pov
          cp -r libcgc/tiny-AES128-C artifact/libcgc-x86_64/tiny-AES128-C
          # Copy compiled binaries
          cp -r libcgc/build64/*.a artifact/libcgc-x86_64/ || true
          # Copy any top-level C files
          cp libcgc/*.c artifact/libcgc-x86_64/ || true
          cp libcgc/*.S artifact/libcgc-x86_64/ || true
          cp libcgc/*.h artifact/libcgc-x86_64/ || true
          # Debug: check directory
          echo "✅ Artifact folder structure:"
          tree -L 4 artifact/libcgc-x86_64

      # 6️⃣ Upload artifact
      - name: Upload libcgc-x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcgc-x86_64
          path: artifact/libcgc-x86_64
          if-no-files-found: error
          retention-days: 5
