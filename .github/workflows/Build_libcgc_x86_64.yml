name: Build libcgc x86_64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libcgc-64bit:
    runs-on: ubuntu-latest
    
    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            make \
            git \
            g++-12 \
            libstdc++-12-dev \
            libc++-dev \
            libc++abi-dev \
            python3-pip \
            tree \
            ninja-build \
            cmake
          pip3 install \
            xlsxwriter \
            pycryptodome \
            defusedxml \
            pyyaml \
            matplotlib

      # 3️⃣ Copy libcgc folder
      - name: Copy libcgc folder
        run: |
          mkdir -p libcgc
          cp -r cgc_env/libcgc/* libcgc/

      # 4️⃣ Build libcgc
      - name: Build libcgc
        run: |
          cd libcgc
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 /usr/lib/x86_64-linux-gnu/libstdc++.so
          rm -rf build64/
          mkdir build64 && cd build64
          BUILD64=1 cmake .. -GNinja
          ninja cgc pov || true  # continue even if some targets fail

      # 5️⃣ Find all artifacts
      - name: Hunt for libcgc build artifacts
        id: find_artifacts
        run: |
          echo "🔍 Searching for libraries and binaries..."
          ARTIFACTS=$(find libcgc/build64 -type f \( -name '*.a' -o -executable \))
          echo "Found files:"
          echo "$ARTIFACTS"
          # Save paths for upload
          echo "paths<<EOF" >> $GITHUB_OUTPUT
          echo "$ARTIFACTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 6️⃣ Upload artifacts dynamically
      - name: Upload libcgc artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libcgc-x86_64
          path: ${{ steps.find_artifacts.outputs.paths }}
          if-no-files-found: error
          retention-days: 5

      # 7️⃣ Debug Output
      - name: Workspace Summary
        run: |
          echo "✅ Build Complete. Directory Structure:"
          tree -L 3 libcgc/build64
