name: Build libcgc x86_64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libcgc-64bit:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Cache Python packages
      - name: Cache Python packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: python-pip-${{ runner.os }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: python-pip-${{ runner.os }}-

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            make \
            git \
            g++-12 \
            libstdc++-12-dev \
            libc++-dev \
            libc++abi-dev \
            python3-pip \
            tree \
            ninja-build \
            cmake

          pip3 install \
            xlsxwriter \
            pycryptodome \
            defusedxml \
            pyyaml \
            matplotlib

      # 4️⃣ Cache build output (Ninja / CMake)
      - name: Cache libcgc build
        uses: actions/cache@v3
        with:
          path: libcgc/build64
          key: libcgc-build-${{ runner.os }}-${{ hashFiles('cgc_env/libcgc/**') }}
          restore-keys: libcgc-build-${{ runner.os }}-

      # 5️⃣ Copy libcgc folder
      - name: Copy libcgc folder
        run: |
          mkdir -p libcgc
          cp -r cgc_env/libcgc/* libcgc/

      # 6️⃣ Build libcgc (64-bit static)
      - name: Build libcgc
        run: |
          cd libcgc
          rm -rf build64/
          mkdir build64 && cd build64
          
          BUILD64=1 cmake .. -GNinja \
            -DBUILD_SHARED_LIBS=OFF \
            -DCMAKE_ARCHIVE_OUTPUT_DIRECTORY=$PWD/lib \
            -DCMAKE_LIBRARY_OUTPUT_DIRECTORY=$PWD/lib \
            -DCMAKE_RUNTIME_OUTPUT_DIRECTORY=$PWD/bin

          ninja cgc pov

      # 7️⃣ Verify Build Artifacts
      - name: Verify Architecture
        run: |
          echo "🔍 Checking library architecture..."
          file libcgc/build64/lib/libcgc.a || echo "⚠️ Library not found"
          
          echo "🔍 Checking a sample Challenge Binary..."
          SAMPLE_BIN=$(find libcgc/build64/bin -type f | head -n 1)
          if [ -f "$SAMPLE_BIN" ]; then
            file "$SAMPLE_BIN"
          else
            echo "⚠️ No binaries found in build64/bin"
          fi

      # 8️⃣ Upload Artifacts
      - name: Upload libcgc-64bit-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libcgc-x86_64
          path: |
            libcgc/build64/lib/
            libcgc/build64/bin/
            libcgc/include/
          if-no-files-found: error
          retention-days: 5

      # 9️⃣ Workspace Summary
      - name: Workspace Summary
        run: |
          echo "✅ Build Complete. Directory Structure:"
          tree -L 3 libcgc/build64
