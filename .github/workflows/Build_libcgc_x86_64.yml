name: Build libcgc x86_64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-libcgc-64bit:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential \
            clang \
            make \
            git \
            g++-12 \
            libstdc++-12-dev \
            libc++-dev \
            libc++abi-dev \
            python3-pip \
            tree \
            ninja-build \
            cmake
          pip3 install \
            xlsxwriter \
            pycryptodome \
            defusedxml \
            pyyaml \
            matplotlib

      # 3. Copy libcgc folder (sources + headers)
      - name: Copy libcgc folder
        run: |
          mkdir -p libcgc
          cp -r cgc_env/libcgc/* libcgc

      # 4 Build libcgc (Force 64-bit)
      - name: Build libcgc
        run: |
          cd libcgc
          # Fix standard library symlink if needed
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libstdc++.so.6 /usr/lib/x86_64-linux-gnu/libstdc++.so
          
          # Clean previous builds
          rm -rf build64/
          mkdir build64 && cd build64
          
          # Configure CMake for 64-bit build
          BUILD64=1 cmake .. -GNinja
          
          # Build target binaries
          ninja cgc pov

      # 5. Verify Build Artifacts
      - name: Verify Architecture
        run: |
          echo "🔍 Checking shared libraries..."
          if [ -f libcgc/build64/include/libcgc.so ]; then
            file libcgc/build64/include/libcgc.so
          else
            echo "libcgc.so not found"
          fi

          if [ -f libcgc/build64/include/libpov/libpov.so ]; then
            file libcgc/build64/include/libpov/libpov.so
          else
            echo "libpov.so not found"
          fi

          echo "🔍 Checking a sample challenge binary..."
          SAMPLE_BIN=$(find libcgc/build64/challenges -type f | head -n 1)
          if [ -f "$SAMPLE_BIN" ]; then
            file "$SAMPLE_BIN"
          else
            echo "No binaries found in build64/challenges"
          fi

      # 6. Upload Artifacts for cgctk
      - name: Upload libcgc-64bit-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libcgc-x86_64
          path: |
            libcgc/build64/lib/
            libcgc/build64/bin/
            libcgc/include/
          if-no-files-found: error
          retention-days: 5

      # 7. Debug Output
      - name: Workspace Summary
        run: |
          echo "Build Complete. Directory Structure:"
          tree -L 3 libcgc/build64
