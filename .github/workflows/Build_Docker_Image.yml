name: Build and Publish QEMU-CGC Docker Image

# Manual trigger only
on:
  workflow_dispatch:

jobs:
  build-docker:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Log in to GitHub Container Registry (GCR)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.secrets.RELEASE_TOKEN }}

      # 3️⃣ Build the Docker image from your GitHub folder
      - name: Build Docker image
        run: |
          export IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/custom-cgpt-qemu:latest
          DOCKER_DIR=cgc_env/docker

          if [ ! -f "$DOCKER_DIR/qemu.Dockerfile" ]; then
            echo "Dockerfile not found in $DOCKER_DIR"
            exit 1
          fi

          docker build -f "$DOCKER_DIR/qemu.Dockerfile" -t $IMAGE_NAME "$DOCKER_DIR"

      # 4️⃣ Push the Docker image to GHCR
      - name: Push Docker image
        run: |
          export IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/custom-cgpt-qemu:latest
          docker push $IMAGE_NAME

      # 5️⃣ Verify the Docker image is available
      - name: Verify Docker image
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/custom-cgpt-qemu:latest
          docker images | grep custom-cgpt-qemu
