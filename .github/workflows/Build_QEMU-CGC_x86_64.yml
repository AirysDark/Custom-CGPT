name: Build qemu-cgc x86_64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0-qc'

jobs:
  build-qemu:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ninja-build \
            libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev tree tar \
            libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
            wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl

      # 3️⃣ Copy qemu-cgc folder
      - name: Copy qemu-cgc folder
        run: |
          mkdir -p qemu-cgc
          cp -r cgc_env/qemu-cgc/* qemu-cgc/

      # 4️⃣ Install pyenv & Python2
      - name: Install pyenv & Python2
        run: |
          curl https://pyenv.run | bash
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"
          pyenv install -s 2.7.18
          pyenv global 2.7.18
          python2 --version

      # 5️⃣ Build QEMU-CGC 64-bit (adaptive jobs, safe RAM)
      - name: Build QEMU-CGC 64-bit
        run: |
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"

          cd qemu-cgc
          chmod +x configure
          ./configure --python=python2 \
                      --target-list=x86_64-linux-user \
                      --disable-werror \
                      --disable-system \
                      --disable-tools

          # High file descriptor limit
          ulimit -n 65536

          # Detect RAM (GB) and CPU cores
          MEM_KB=$(grep MemTotal /proc/meminfo | awk '{print $2}')
          MEM_GB=$(( MEM_KB / 1024 / 1024 ))
          CPU_CORES=$(nproc)
          echo "Detected RAM: ${MEM_GB} GB, CPU cores: $CPU_CORES"

          # Compute max parallel jobs: ~2GB RAM per job, limit to cores and max 8
          MAX_JOBS=$(( MEM_GB / 2 ))
          if [ "$MAX_JOBS" -gt 8 ]; then MAX_JOBS=8; fi
          if [ "$MAX_JOBS" -gt "$CPU_CORES" ]; then MAX_JOBS=$CPU_CORES; fi
          if [ "$MAX_JOBS" -lt 1 ]; then MAX_JOBS=1; fi
          echo "Using $MAX_JOBS parallel jobs"

          # Optional: cap virtual memory per job (~3GB per job)
          ulimit -v $((3*1024*1024))

          # Build only QEMU user x86_64
          make -j$MAX_JOBS qemu-user/qemu64

      # 6️⃣ Verify binary
      - name: Verify binary
        run: |
          BIN="qemu-cgc/qemu-user/qemu64/qemu-x86_64"
          if [ -f "$BIN" ]; then
            echo "✅ Binary found:"
            file "$BIN"
          else
            echo "⚠️ Binary missing!"
            exit 1
          fi

      # 7️⃣ Upload 64-bit CGC binary
      - name: Upload 64-bit CGC binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: qemu-cgc/qemu-user/qemu64/qemu-x86_64
          if-no-files-found: error

      # 8️⃣ Download artifact (for release step)
      - name: Download qemu-cgc artifact
        uses: actions/download-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: artifact

      # 9️⃣ Create GitHub Release and upload artifact
      - name: Create Release and Upload
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_tag }}
          name: "qemu-cgc 64bit"
          token: ${{ secrets.RELEASE_TOKEN }}
          artifacts: artifact/

      # 🔟 Optional: Workspace tree (debug)
      - name: Workspace tree (debug)
        run: tree -L 3 qemu-cgc/qemu-user/qemu64 || true
