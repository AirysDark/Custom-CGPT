name: Build QEMU-CGC x86_64 (manual Docker run)

on:
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: self-hosted
    steps:

      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Build inside Docker
      - name: Build QEMU-CGC inside Docker
        run: |
          # Paths
          SRC_DIR="$(pwd)/cgc_env/qemu-cgc"
          BIN_DIR="$(pwd)/qemu-cgc-bin"
          mkdir -p "$BIN_DIR"

          # Pull Docker image
          docker pull ubuntu:24.04

          # Run build in container
          docker run --rm \
            --ulimit nofile=65535:65535 \
            -v "$SRC_DIR":/opt/qemu-cgc/source \
            -v "$BIN_DIR":/opt/qemu-cgc/bin \
            -w /opt/qemu-cgc/source \
            ubuntu:24.04 \
            bash -c "
              set -e

              # Install dependencies
              apt update && apt install -y \
                build-essential git ninja-build \
                libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev \
                libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
                wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl \
                python3 python3-pip python3-setuptools

              # Ensure configure script is executable
              chmod +x cgc_configure_opt

              # Force x86_64 target
              sed -i 's/--target-list=.*$/--target-list=x86_64-linux-user/' cgc_configure_opt

              # Run configure
              ./cgc_configure_opt

              # Sequential build to avoid open file limits
              make -j1 qemu-common
              make -j1 qemu-user
              make -j1 ui
              make -j1 tests
              make -j1 target-x86_64

              # Copy final binary
              cp qemu-user/qemu64/qemu-x86_64 /opt/qemu-cgc/bin/
            "

      # 3️⃣ Confirm binary exists
      - name: List built binary
        run: ls -l qemu-cgc-bin/
