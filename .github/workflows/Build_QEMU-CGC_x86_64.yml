name: Build Custom-CGPT (Optimized + QEMU Precompiled)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-qemu:
    runs-on: ubuntu-24.04
    env:
      PYENV_ROOT: $HOME/.pyenv
      PATH: $HOME/.pyenv/bin:$HOME/.pyenv/shims:$PATH

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Cache pyenv Python 2.7.18
      uses: actions/cache@v3
      with:
        path: |
          ~/.pyenv/versions/2.7.18
          ~/.pyenv/pyenv.d
        key: pyenv-2.7.18-${{ runner.os }}
        restore-keys: pyenv-2.7.18-

    - name: Cache QEMU build
      uses: actions/cache@v3
      with:
        path: qemu-cgc/qemu-user/qemu64
        key: qemu-cgc-${{ runner.os }}-${{ github.sha }}
        restore-keys: qemu-cgc-${{ runner.os }}-

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git ninja-build \
          libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev tree tar \
          libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
          wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl

    - name: Install pyenv and Python 2.7.18
      run: |
        if [ ! -d "$HOME/.pyenv" ]; then
          curl https://pyenv.run | bash
        fi
        export PYENV_ROOT="$HOME/.pyenv"
        export PATH="$PYENV_ROOT/bin:$PYENV_ROOT/shims:$PATH"
        eval "$(pyenv init --path)"
        eval "$(pyenv init -)"
        eval "$(pyenv virtualenv-init -)"
        pyenv install -s 2.7.18
        pyenv global 2.7.18
        python2 --version

    - name: Prepare QEMU build directory
      run: |
        mkdir -p qemu-cgc
        cp -r cgc_env/qemu-cgc/* qemu-cgc/
        cd qemu-cgc
        chmod +x configure cgc_configure_opt
        sed -i 's/x86_64-linux-user//g' cgc_configure_opt
        ulimit -n 65536
        MEM_KB=$(grep MemTotal /proc/meminfo | awk '{print $2}')
        MEM_LIMIT=$(( MEM_KB * 75 / 100 ))
        ulimit -v $MEM_LIMIT
        CPU_CORES=$(nproc)
        JOBS=$(( MEM_KB / (4*1024*1024) ))
        if [ "$JOBS" -lt 1 ]; then JOBS=1; fi
        if [ "$JOBS" -gt "$CPU_CORES" ]; then JOBS=$CPU_CORES; fi
        if [ "$JOBS" -gt 8 ]; then JOBS=8; fi
        echo "Using $JOBS parallel jobs"
        ./cgc_configure_opt
        make -j$JOBS qemu-user/qemu64

    - name: Verify build
      run: |
        BIN="qemu-user/qemu64/qemu-x86_64"
        if [ -f "$BIN" ]; then
          echo "✅ Binary built successfully:"
          file "$BIN"
        else
          echo "⚠️ Binary missing!"
          exit 1
        fi
