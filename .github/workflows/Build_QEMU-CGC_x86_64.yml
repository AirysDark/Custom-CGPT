name: Build qemu-cgc x86_64 (self-hosted)

on:
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: self-hosted

    steps:
      # 1️⃣ Prepare source
      - name: Prepare QEMU-CGC source
        run: |
          cd /opt/qemu-cgc/source
          
      # 2️⃣ Environment setup
      - name: Set up build environment
        run: |
          python3 /opt/qemu-cgc/build_scripts/env_setup.py

      # 3️⃣ Configure QEMU-CGC
      - name: Configure QEMU-CGC
        run: |
          python3 /opt/qemu-cgc/build_scripts/configure_qemu.py

      # 4️⃣ Build QEMU-CGC with Ninja
      - name: Build QEMU-CGC 64-bit
        run: |
          python3 /opt/qemu-cgc/build_scripts/build_qemu_ninja.py

      # 5️⃣ Copy binary to bin
      - name: Copy QEMU-CGC binary
        run: |
          python3 /opt/qemu-cgc/build_scripts/copy_binary.py

      # 6️⃣ Verify binary
      - name: Verify QEMU-CGC binary
        run: |
          python3 /opt/qemu-cgc/build_scripts/verify_binary.py
