name: Build QEMU-CGC

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: ubuntu-24.04
    steps:

      # 1️⃣ Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2️⃣ Install system dependencies
      - name: Install system packages
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential git ninja-build \
            libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev \
            libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
            wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl \
            tree tar uuid-dev libpng-dev libpng-tools

      # 3️⃣ Prepare QEMU-CGC environment
      - name: Prepare QEMU-CGC
        run: |
          mkdir -p qemu-cgc
          cp -r cgc_env/qemu-cgc/* qemu-cgc/

      # 4️⃣ Setup Python 2.7 via pyenv
      - name: Setup Python 2.7
        run: |
          curl https://pyenv.run | bash
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"
          pyenv install -s 2.7.18
          pyenv global 2.7.18
          python2 --version

      # 5️⃣ Build QEMU-CGC using custom configure
      - name: Build QEMU-CGC
        run: |
          cd qemu-cgc
          chmod +x cgc_configure_opt
          ./cgc_configure_opt

          JOBS=2
          echo "Using $JOBS parallel jobs"

          for i in {1..2}; do
              echo "Attempt $i to build QEMU-CGC..."
              make -j$JOBS qemu-user/qemu64 && break || echo "⚠️ Build failed, retrying..."
          done

          BIN="qemu-user/qemu64/qemu-x86_64"
          if [ -f "$BIN" ]; then
              echo "✅ Binary built successfully:"
              file "$BIN"
          else
              echo "⚠️ Binary missing!"
              exit 1
          fi
