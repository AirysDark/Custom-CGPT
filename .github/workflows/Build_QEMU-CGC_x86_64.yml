name: Build qemu-cgc x86_64 (self-hosted)

on:
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: self-hosted

    steps:
      - name: Build QEMU-CGC 64-bit
        run: |
          # Go to manually prepared source
          cd /opt/qemu-cgc/source

          # Make configure script executable
          chmod +x cgc_configure_opt configure

          # Ensure target is x86_64
          sed -i 's/--target-list=.*$/--target-list=x86_64-linux-user/' cgc_configure_opt

          # Run configuration
          ./cgc_configure_opt

          # Use 2 parallel jobs (safe)
          JOBS=2
          for i in {1..2}; do
              make -j$JOBS qemu-user/qemu64 && break || echo "⚠️ Retry build..."
          done

          # Copy final binary to /opt/qemu-cgc/bin
          mkdir -p /opt/qemu-cgc/bin
          cp qemu-user/qemu64/qemu-x86_64 /opt/qemu-cgc/bin/

          # Verify
          if [ -f /opt/qemu-cgc/bin/qemu-x86_64 ]; then
              echo "✅ QEMU-CGC built successfully: /opt/qemu-cgc/bin/qemu-x86_64"
              file /opt/qemu-cgc/bin/qemu-x86_64
          else
              echo "❌ Build failed!"
              exit 1
          fi
