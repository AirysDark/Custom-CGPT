name: Build qemu-cgc x86_64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0-qc'

jobs:
  build-qemu:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ninja-build \
            libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev tree tar \
            libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
            wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl

      # 3️⃣ Copy qemu-cgc folder
      - name: Copy qemu-cgc folder
        run: |
          mkdir -p qemu-cgc
          cp -r cgc_env/qemu-cgc/* qemu-cgc/

      # 4️⃣ Install pyenv & Python2
      - name: Install pyenv & Python2
        run: |
          curl https://pyenv.run | bash
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"
          pyenv install -s 2.7.18
          pyenv global 2.7.18
          python2 --version

      # 5️⃣ Build QEMU-CGC 64-bit using cgc_configure_opt
      - name: Build QEMU-CGC 64-bit (optimized)
        run: |
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"

          cd qemu-cgc
          chmod +x ../cgc_configure_opt

          # Use x86_64 target
          sed -i 's/x86_64-linux-user/' ../cgc_configure_opt

          # Set high file limit
          ulimit -n 65536

          # Limit virtual memory to ~75% of runner RAM
          MEM_KB=$(grep MemTotal /proc/meminfo | awk '{print $2}')
          MEM_LIMIT=$(( MEM_KB * 75 / 100 ))
          ulimit -v $MEM_LIMIT

          # Determine safe parallel jobs: 1 per 4GB RAM, max 8, max CPU cores
          CPU_CORES=$(nproc)
          JOBS=$(( MEM_KB / (4*1024*1024) )) # 4GB per job
          if [ "$JOBS" -lt 1 ]; then JOBS=1; fi
          if [ "$JOBS" -gt "$CPU_CORES" ]; then JOBS=$CPU_CORES; fi
          if [ "$JOBS" -gt 8 ]; then JOBS=8; fi
          echo "Using $JOBS parallel jobs for build"

          # Configure and build
          ../cgc_configure_opt
          make -j$JOBS qemu-user/qemu64

          # Verify
          BIN="qemu-user/qemu64/qemu-x86_64"
          if [ -f "$BIN" ]; then
            echo "✅ Binary built successfully:"
            file "$BIN"
          else
            echo "⚠️ Binary missing!"
            exit 1
          fi

      # 6️⃣ Upload 64-bit CGC binary
      - name: Upload 64-bit CGC binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: qemu-cgc/qemu-user/qemu64/qemu-x86_64
          if-no-files-found: error

      # 7️⃣ Download artifact (for release step)
      - name: Download qemu-cgc artifact
        uses: actions/download-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: artifact

      # 8️⃣ Create GitHub Release and upload artifact
      - name: Create Release and Upload
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_tag }}
          name: "qemu-cgc 64bit"
          token: ${{ secrets.RELEASE_TOKEN }}
          artifacts: artifact/

      # 9️⃣ Optional: Workspace tree (debug)
      - name: Workspace tree (debug)
        run: tree -L 3 qemu-cgc/qemu-user/qemu64 || true
