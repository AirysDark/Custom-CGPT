name: Build QEMU-CGC

on:
#  push:
#    branches: [main]
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential git ninja-build \
          libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev \
          libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
          wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl \
          tree tar uuid-dev libpng-dev libpng-tools \
          bsdextrautils eject fdisk libblkid-dev libblkid1 \
          libbrotli-dev libfreetype-dev libfreetype6 libgirepository-2.0-0 \
          libglib2.0-dev-bin libmount-dev libmount1 libpthread-stubs0-dev \
          libselinux1-dev libsepol-dev libsmartcols1 libuuid1 libx11-dev \
          libxau-dev libxcb1-dev libxdmcp-dev libxext-dev libxft-dev \
          libxrender-dev libxss-dev llvm-runtime mount tcl-dev tcl8.6-dev \
          tk8.6-dev util-linux uuid-runtime x11proto-core-dev x11proto-dev \
          xorg-sgml-doctools xtrans-dev
        sudo apt upgrade -y

    - name: Install Python 2 via pyenv and Build QEMU-CGC
      run: |
        # Install pyenv
        curl https://pyenv.run | bash
        export PATH="$HOME/.pyenv/bin:$PATH"
        eval "$(pyenv init --path)"
        eval "$(pyenv init -)"
        eval "$(pyenv virtualenv-init -)"
        
        # Install Python 2.7.18
        pyenv install -s 2.7.18
        pyenv global 2.7.18
        python2 --version

        # Prepare QEMU-CGC
        mkdir -p qemu-cgc
        cp -r cgc_env/qemu-cgc/* qemu-cgc/
        cd qemu-cgc
        chmod +x cgc_configure_opt configure
        ./cgc_configure_opt

        JOBS=2
        echo "Using $JOBS parallel jobs"
        for i in {1..2}; do
          echo "Attempt $i to build QEMU-CGC..."
          make -j$JOBS qemu-user/qemu64 && break || echo "⚠️ Build failed, retrying..."
        done

        BIN="qemu-user/qemu64/qemu-x86_64"
        if [ -f "$BIN" ]; then
          echo "✅ Binary built successfully:"
          file "$BIN"
        else
          echo "⚠️ Binary missing!"
          exit 1
        fi

    - name: Archive QEMU binary
      uses: actions/upload-artifact@v3
      with:
        name: qemu-cgc-binary
        path: qemu-cgc/qemu-user/qemu64/qemu-x86_64
