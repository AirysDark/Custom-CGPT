name: Build qemu-cgc x86_64 (self-hosted)

on:
  workflow_dispatch:

jobs:
  build-qemu:
    runs-on: self-hosted

    steps:
      # 1️⃣ Prepare QEMU-CGC source
      - name: Prepare source
        run: |
          cd /opt/qemu-cgc/source
          

      # 2️⃣ Configure QEMU-CGC
      - name: Configure QEMU-CGC
        run: |
          cd /opt/qemu-cgc/source

          # Enforce x86_64 target explicitly
          sed -i 's/--target-list=.*$/--target-list=x86_64-linux-user/' cgc_configure_opt

          # Ensure no i386 references remain
          if grep -q 'i386' cgc_configure_opt; then
              echo "❌ Found i386 in configure script; aborting"
              exit 1
          fi

          # Run configuration with Python2 from pyenv
          ./cgc_configure_opt --python=$(pyenv which python2)

      # 3️⃣ Build QEMU-CGC safely
      - name: Build QEMU-CGC 64-bit
        run: |
          cd /opt/qemu-cgc/source

          # Use safe build: 1 parallel job, retry up to 3 times
          JOBS=1
          for attempt in {1..3}; do
              echo "Attempt $attempt to build QEMU-CGC..."
              make -j$JOBS qemu-user/qemu64 && break || echo "⚠️ Build failed; retrying..."
          done

          # Verify that binary exists
          BIN="/opt/qemu-cgc/bin/qemu-x86_64"
          mkdir -p /opt/qemu-cgc/bin
          if [ -f qemu-user/qemu64/qemu-x86_64 ]; then
              cp qemu-user/qemu64/qemu-x86_64 "$BIN"
              echo "✅ QEMU-CGC built successfully:"
              file "$BIN"
          else
              echo "❌ Build failed: binary not found!"
              exit 1
          fi

      # 4️⃣ Optional: List binary
      - name: List built binary
        run: ls -lh /opt/qemu-cgc/bin/qemu-x86_64
