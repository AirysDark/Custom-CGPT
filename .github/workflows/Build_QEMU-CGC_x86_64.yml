name: Build qemu-cgc x86_64

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0-qc'

jobs:
  build-qemu:
    runs-on: self-hosted

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies (only needed first time)
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ninja-build \
            libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev tree tar \
            libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
            wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl

      # 3️⃣ Prepare persistent QEMU-CGC folder
      - name: Prepare persistent folder
        run: |
          mkdir -p /opt/qemu-cgc
          if [ ! -d /opt/qemu-cgc/source ]; then
              echo "Copying QEMU-CGC source to persistent folder..."
              cp -r cgc_env/qemu-cgc /opt/qemu-cgc/source
          fi

      # 4️⃣ Install pyenv & Python2 (only first run)
      - name: Install pyenv & Python2
        run: |
          if [ ! -d "$HOME/.pyenv" ]; then
              curl https://pyenv.run | bash
          fi
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"
          if ! pyenv versions | grep -q 2.7.18; then
              pyenv install -s 2.7.18
          fi
          pyenv global 2.7.18
          python2 --version

      # 5️⃣ Configure & Build QEMU-CGC safely
      - name: Build QEMU-CGC 64-bit
        run: |
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"

          cd /opt/qemu-cgc/source
          chmod +x configure cgc_configure_opt

          # Use optimized configure script for x86_64
          sed -i 's/i386-linux-user/x86_64-linux-user/' cgc_configure_opt
          ./cgc_configure_opt

          # Determine safe parallel jobs (max 2 for stability)
          JOBS=2
          echo "Using $JOBS parallel jobs"

          # Retry build in case of transient segmentation faults
          for i in {1..2}; do
              echo "Attempt $i to build QEMU-CGC..."
              make -j$JOBS qemu-user/qemu64 && break || echo "⚠️ Segfault detected, retrying..."
          done

          # Verify binary
          BIN="qemu-user/qemu64/qemu-x86_64"
          if [ -f "$BIN" ]; then
              echo "✅ Binary built successfully:"
              file "$BIN"
              # Copy binary to persistent folder
              cp "$BIN" /opt/qemu-cgc/qemu-x86_64
          else
              echo "⚠️ Binary missing!"
              exit 1
          fi

      # 6️⃣ Upload 64-bit CGC binary (optional)
      - name: Upload 64-bit CGC binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: /opt/qemu-cgc/qemu-x86_64
          if-no-files-found: error

      # 7️⃣ Create GitHub Release and upload artifact
      - name: Create Release and Upload
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_tag }}
          name: "qemu-cgc 64bit"
          token: ${{ secrets.RELEASE_TOKEN }}
          artifacts: /opt/qemu-cgc/qemu-x86_64

      # 8️⃣ Optional: Workspace tree (debug)
      - name: Workspace tree (debug)
        run: tree -L 3 /opt/qemu-cgc || true
