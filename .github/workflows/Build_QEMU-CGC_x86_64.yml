name: Build qemu-cgc x86_64 (dynamic split-build)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0-qc'

jobs:
  build-qemu:
    runs-on: ubuntu-24.04

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git ninja-build \
            libglib2.0-dev libfdt-dev libpixman-1-dev zlib1g-dev tree tar \
            libffi-dev libssl-dev libbz2-dev libreadline-dev libsqlite3-dev \
            wget llvm libncurses5-dev libncursesw5-dev xz-utils tk-dev curl

      # 3️⃣ Copy qemu-cgc folder
      - name: Copy qemu-cgc folder
        run: |
          mkdir -p qemu-cgc
          cp -r cgc_env/qemu-cgc/* qemu-cgc/

      # 4️⃣ Install pyenv & Python2
      - name: Install pyenv & Python2
        run: |
          curl https://pyenv.run | bash
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"
          pyenv install -s 2.7.18
          pyenv global 2.7.18
          python2 --version

      # 5️⃣ Build QEMU-CGC (dynamic split)
      - name: Build QEMU-CGC 64-bit (dynamic split)
        run: |
          export PATH="$HOME/.pyenv/bin:$PATH"
          eval "$(pyenv init --path)"
          eval "$(pyenv init -)"
          eval "$(pyenv virtualenv-init -)"

          cd qemu-cgc
          chmod +x configure
          ./configure --python=python2 \
                      --target-list=x86_64-linux-user \
                      --disable-werror \
                      --disable-system \
                      --disable-tools

          # Set high file limit
          ulimit -n 65536

          # Detect total RAM (KB) and CPU cores
          MEM_KB=$(grep MemTotal /proc/meminfo | awk '{print $2}')
          MEM_GB=$(( MEM_KB / 1024 / 1024 ))
          CPU_CORES=$(nproc)
          echo "Detected RAM: ${MEM_GB} GB, CPU cores: $CPU_CORES"

          # Use ~75% of RAM for build
          MEM_LIMIT=$(( MEM_KB * 75 / 100 ))
          ulimit -v $MEM_LIMIT
          echo "Limiting virtual memory to $MEM_LIMIT KB (~75% of RAM)"

          # Determine per-job RAM (2GB recommended)
          PER_JOB_MEM=$((2 * 1024 * 1024))
          MAX_JOBS=$(( MEM_LIMIT / PER_JOB_MEM ))
          if [ "$MAX_JOBS" -lt 1 ]; then MAX_JOBS=1; fi
          if [ "$MAX_JOBS" -gt "$CPU_CORES" ]; then MAX_JOBS=$CPU_CORES; fi
          if [ "$MAX_JOBS" -gt 8 ]; then MAX_JOBS=8; fi
          echo "Using up to $MAX_JOBS parallel jobs per chunk"

          # Collect all object files
          OBJ_FILES=$(make -n qemu-user/qemu64 | grep -oE '\S+\.o')
          TOTAL_OBJS=$(echo "$OBJ_FILES" | wc -l)
          echo "Total object files: $TOTAL_OBJS"

          # Split into chunks of ~50% RAM each
          CHUNK_SIZE=$(( TOTAL_OBJS / MAX_JOBS ))
          if [ "$CHUNK_SIZE" -lt 1 ]; then CHUNK_SIZE=1; fi

          echo "Chunk size: $CHUNK_SIZE objects"

          START=0
          while [ "$START" -lt "$TOTAL_OBJS" ]; do
            END=$(( START + CHUNK_SIZE ))
            if [ "$END" -gt "$TOTAL_OBJS" ]; then END=$TOTAL_OBJS; fi
            echo "Building objects $START to $END..."
            CHUNK_OBJS=$(echo "$OBJ_FILES" | sed -n "$((START+1)),$END p")
            make -j$MAX_JOBS qemu-user/qemu64 OBJ_CHUNK="$CHUNK_OBJS" || \
              { echo "❌ Chunk build failed; retrying with half jobs"; \
                make -j$((MAX_JOBS/2)) qemu-user/qemu64 OBJ_CHUNK="$CHUNK_OBJS"; }
            START=$END
          done

      # 6️⃣ Verify binary
      - name: Verify binary
        run: |
          BIN="qemu-cgc/qemu-user/qemu64/qemu-x86_64"
          if [ -f "$BIN" ]; then
            echo "✅ Binary found:"
            file "$BIN"
          else
            echo "⚠️ Binary missing!"
            exit 1
          fi

      # 7️⃣ Upload artifact
      - name: Upload 64-bit CGC binary
        uses: actions/upload-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: qemu-cgc/qemu-user/qemu64/qemu-x86_64
          if-no-files-found: error

      # 8️⃣ Download artifact
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: qemu-cgc-64bit
          path: artifact

      # 9️⃣ Create GitHub Release
      - name: Create Release and Upload
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_tag }}
          name: "qemu-cgc 64bit"
          token: ${{ secrets.RELEASE_TOKEN }}
          artifacts: artifact/

      # 🔟 Optional: Workspace tree (debug)
      - name: Workspace tree (debug)
        run: tree -L 3 qemu-cgc/qemu-user/qemu64 || true
