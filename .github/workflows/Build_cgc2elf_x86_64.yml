name: Build cgc2elf x86_64

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install dependencies
      - name: Install build tools
        run: |
          sudo apt update
          sudo apt install -y build-essential git gcc

      # 3. Copy source folder
      - name: Copy cgc2elf folder
        run: |
          mkdir -p cgc2elf
          cp -r cgc_env/cgc2elf/* cgc2elf/

      # 4. Build the binary
      - name: Build cgc2elf
        run: |
          cd cgc2elf
          make clean || true
          make CFLAGS="-O2 -w -Wno-unused-result" cgc2elf

      # 5. Verify the binary exists
      - name: Verify binary
        run: |
          ls -l cgc2elf
          file cgc2elf/cgc2elf

      # 6. Upload as GitHub Actions artifact
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cgc2elf-binary
          path: cgc2elf/cgc2elf
          if-no-files-found: error
          retention-days: 5

      # 7. Create GitHub Release using the artifact
      - name: Create Release and Attach Artifact
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_tag }}
          name: "cgc2elf x86_64"
          artifacts: cgc2elf/cgc2elf   # direct path to built binary
          token: ${{ secrets.RELEASE_TOKEN }} # must be a PAT with repo access
          generateReleaseNotes: false
          makeLatest: true
