name: Build cgc2elf x86_64

on:
#  push:
#    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create (e.g., v1.0.0)'
        required: true
        default: 'cgc2elf v1.0.0'

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      # 1. Checkout repository
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Install build tools ONLY (no pandoc)
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git gcc

      # 3. Copy cgc2elf folder from repo
      - name: Copy cgc2elf folder
        run: |
          mkdir -p cgc2elf
          cp -r cgc_env/cgc2elf/* cgc2elf/

      # 4. Build binary only
      - name: Build cgc2elf binary
        run: |
          cd cgc2elf
          make clean || true
          make CFLAGS="-O2 -w -Wno-unused-result" cgc2elf

      # 5. Verify binary exists
      - name: Verify binary exists
        run: |
          ls -l cgc2elf
          file cgc2elf/cgc2elf

      # 6. Upload artifact for reuse
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: cgc2elf-binary
          path: cgc2elf/cgc2elf
          if-no-files-found: error
          retention-days: 5

      # 7. Download the artifact from the build job
      - name: Download cgc2elf artifact
        uses: actions/download-artifact@v4
        with:
          name: cgc2elf-binary
          path: artifact

      # 8. Create GitHub Release and upload artifact
      - name: Create Release and Upload
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.release_tag }}
          name: "cgc2elf x86_64"
          token: ${{ secrets.RELEASE_TOKEN }}
          artifacts: artifact/
